<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="envswitch-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect x="51.2" y="51.2" width="409.6" height="409.6" rx="102.4" fill="url(#envswitch-gradient)"/>
  
  <!-- ENV text -->
  <text x="256" y="230" font-family="'Courier New', monospace" font-size="180" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-10">ENV</text>
  
  <!-- Primary down arrow (solid white) -->
  <path d="M 180 280 L 256 358 L 332 280" stroke="white" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Secondary down arrow (semi-transparent, slightly lower) -->
